<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>EditVerse — Premium Video Editing Marketplace</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#15161B; --ink-soft:#5B5D6B; --ink-faint:#9A9CAB;
  --bg:#F3F4F9; --card:#ffffff;
  --accent:#6D5DF6; --accent2:#4F8EF7; --gold:#D8A84E;
  --green:#2FB380; --red:#E15554; --amber:#DDA22B;
  --line:#ECECF2; --line-soft:#F5F5F9;
  --radius:22px; --radius-sm:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
h1,h2,h3,.display{font-family:'Plus Jakarta Sans',sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D8D9E4;border-radius:8px;}

.glass{
  background:rgba(255,255,255,0.72); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.6); box-shadow:0 8px 32px rgba(31,32,56,0.06);
}
.card{background:var(--card); border-radius:var(--radius); box-shadow:0 2px 16px rgba(20,20,40,0.05);}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:12px 20px; border-radius:16px; font-weight:600; font-size:14px; transition:transform .15s ease, opacity .15s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff;}
.btn-ghost{background:#F0F0F5; color:var(--ink-soft);}
.btn-gold{background:var(--gold); color:#fff;}
.btn-sm{padding:8px 14px; font-size:13px; border-radius:12px;}
.input{
  width:100%; padding:12px 14px; border-radius:14px; border:1px solid var(--line);
  font-size:14px; outline:none; background:#fff; color:var(--ink);
}
.input:focus{border-color:var(--accent);}
.label{font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; display:block;}
.pill{display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:99px; font-size:11.5px; font-weight:600;}
.dot{width:6px;height:6px;border-radius:50%;}
.container{max-width:1200px; margin:0 auto; padding:0 18px;}
.grid{display:grid; gap:16px;}
.flex{display:flex;}
.row-scroll{display:flex; gap:14px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none;}
.row-scroll::-webkit-scrollbar{display:none;}
.skeleton{background:linear-gradient(90deg,#eee,#f6f6f6,#eee); background-size:200% 100%; animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:translateY(0);}}
.toast{
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:400;
  background:var(--ink); color:#fff; padding:12px 20px; border-radius:16px; font-size:13.5px; font-weight:500;
  box-shadow:0 12px 32px rgba(0,0,0,0.25); display:flex; align-items:center; gap:8px;
}
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,20,30,0.4); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; z-index:500; padding:16px;
}
.modal-box{
  background:#fff; border-radius:26px; padding:24px; width:100%; max-width:480px; max-height:88vh; overflow-y:auto;
  box-shadow:0 24px 64px rgba(0,0,0,0.22);
}
.modal-box.wide{max-width:640px;}
.badge-num{
  position:absolute; top:-4px; right:-4px; background:var(--red); color:#fff; font-size:10px; font-weight:700;
  min-width:16px; height:16px; border-radius:99px; display:flex; align-items:center; justify-content:center; padding:0 3px;
}
.icon-btn{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;}
.hidden{display:none !important;}

/* Auth screen */
#authScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  background:radial-gradient(circle at 20% 20%, #EDE9FF 0%, transparent 45%), radial-gradient(circle at 80% 80%, #E5F0FF 0%, transparent 45%), var(--bg);}
.auth-card{width:100%; max-width:400px; padding:34px 28px;}
.auth-logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px;margin-bottom:18px;}

/* App shell */
#appShell{display:none;}
.topbar{position:sticky; top:0; z-index:100; padding:12px 0; background:rgba(243,244,249,0.85); backdrop-filter:blur(14px);}
.search-bar{display:flex; align-items:center; gap:8px; padding:11px 15px; border-radius:16px; flex:1;}
.search-bar input{border:none; outline:none; background:transparent; flex:1; font-size:14px;}
.tabbar{
  position:fixed; bottom:0; left:0; right:0; z-index:200; display:flex; justify-content:space-around;
  padding:10px 6px calc(10px + env(safe-area-inset-bottom)); background:rgba(255,255,255,0.9); backdrop-filter:blur(20px);
  border-top:1px solid var(--line);
}
.tab-item{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10.5px; font-weight:600; color:var(--ink-faint); padding:4px 10px; border-radius:12px;}
.tab-item.active{color:var(--accent);}
.page-content{padding:16px 0 100px;}
.prod-card{width:168px; flex-shrink:0;}
.prod-thumb{height:110px; border-radius:16px; background:linear-gradient(135deg,var(--accent),var(--accent2)); position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center;}
.cat-chip{padding:9px 15px; border-radius:14px; font-size:12.5px; font-weight:600; white-space:nowrap; background:#fff; color:var(--ink-soft); border:1px solid var(--line);}
.cat-chip.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.section-title{font-size:16px; font-weight:700; margin:22px 0 12px; display:flex; align-items:center; justify-content:space-between;}
.grid-products{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
@media(min-width:680px){.grid-products{grid-template-columns:repeat(3,1fr);}}
@media(min-width:960px){.grid-products{grid-template-columns:repeat(4,1fr);}}
.pcard{padding:0; overflow:hidden;}
.pcard-body{padding:12px;}
.qr-box{width:180px; height:180px; margin:0 auto; padding:10px; background:#fff; border-radius:18px; display:flex; align-items:center; justify-content:center; border:1px solid var(--line);}
.amount-chip{padding:10px 0; text-align:center; border-radius:14px; border:1.5px solid var(--line); font-weight:700; font-size:14px;}
.amount-chip.active{border-color:var(--accent); background:#EDEBFF; color:var(--accent);}
table{width:100%; border-collapse:collapse; font-size:13.5px;}
th{text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--ink-faint); padding:10px 12px; border-bottom:1px solid var(--line);}
td{padding:11px 12px; border-bottom:1px solid var(--line-soft);}

/* Admin */
#adminShell{display:none;}
.admin-layout{display:flex; min-height:100vh;}
.admin-sidebar{width:236px; padding:20px 14px; position:sticky; top:0; height:100vh; background:rgba(255,255,255,0.9); border-right:1px solid var(--line); flex-shrink:0;}
.admin-nav-item{display:flex; align-items:center; gap:11px; padding:10px 12px; border-radius:14px; font-size:13.5px; font-weight:600; color:var(--ink-soft); margin-bottom:2px;}
.admin-nav-item.active{background:#EDEBFF; color:var(--accent);}
.admin-main{flex:1; min-width:0; padding:22px 26px 60px;}
.stat-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px;}
@media(min-width:760px){.stat-grid{grid-template-columns:repeat(4,1fr);}}
.stat-card{padding:18px;}
.health-strip{display:flex; flex-wrap:wrap; gap:22px; align-items:center; padding:16px 20px;}
.pulse{width:9px;height:9px;border-radius:50%; position:relative;}
.pulse::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:inherit;opacity:.35;animation:pulseAnim 1.6s infinite;}
@keyframes pulseAnim{0%{transform:scale(1);opacity:.5;}100%{transform:scale(2.1);opacity:0;}}
.bar-track{height:8px; border-radius:6px; background:var(--line-soft); overflow:hidden;}
.bar-fill{height:100%; border-radius:6px;}
.spark{display:flex; align-items:flex-end; gap:5px; height:120px;}
.spark div{flex:1; border-radius:6px 6px 0 0; background:linear-gradient(180deg,var(--accent),var(--accent2));}
@media(max-width:820px){.admin-sidebar{position:fixed; left:0; top:0; z-index:300; transform:translateX(-100%); transition:transform .2s;}
  .admin-sidebar.open{transform:translateX(0);} }
@media(min-width:820px){.desktop-nav{display:flex !important;} .tabbar{display:none !important;} .page-content{padding-bottom:40px;}}
.desktop-nav{display:none; align-items:center; gap:6px;}
.desktop-nav .nav-link{padding:9px 14px; border-radius:12px; font-size:13.5px; font-weight:600; color:var(--ink-soft);}
.desktop-nav .nav-link.active{background:#EDEBFF; color:var(--accent);}
</style>
</head>
<body>

<!-- ============ AUTH SCREEN ============ -->
<div id="authScreen">

<!-- ============ CUSTOMER APP SHELL ============ -->
<div id="appShell">

    <button class="tab-item" data-tab="wallet" onclick="goPage('wallet')"><span class="ic"></span>Wallet</button>
    <button class="tab-item" data-tab="profile" onclick="goPage('profile')"><span class="ic"></span>Profile</button>

</div>

  <div class="admin-layout">

          <div style="font-weight:700;font-size:13.5px;">EditVerse</div>

<div id="modalRoot"></div>

<script>
/* ================= ICONS (inline SVG, feather-style) ================= */

function icon(name,size=18,color='currentColor',fill='none'){
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;
}

/* ================= STORAGE HELPERS ================= */
async function loadKey(key, seedFn){
  try{
    const res = await window.storage.get(key,false);
    return res ? JSON.parse(res.value) : await seedAndSave(key,seedFn);
  }catch(e){ return await seedAndSave(key,seedFn); }
}
async function seedAndSave(key,seedFn){
  const val = seedFn();
  await saveKey(key,val);
  return val;
}
async function saveKey(key,value){
  try{ await window.storage.set(key, JSON.stringify(value), false); }catch(e){ console.error('storage error',e); }
}

/* ================= UTILITIES ================= */
const uidGen = p => p+'_'+Math.random().toString(36).slice(2,9);
const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const fmtINR = n => '₹'+Number(n).toLocaleString('en-IN');
const daysAgo = n => { const d=new Date(); d.setDate(d.getDate()-n); return d; };
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime = d => new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
function initials(name){ return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

/* ================= SEED DATA ================= */
const CATEGORIES = ["Alight Motion XML","CapCut Templates","Premiere Pro Projects","After Effects Templates","DaVinci Resolve Templates","Motion Graphics","Fonts","Sound Effects","LUTs","Presets","PNG Assets","Overlay Packs","Stock Videos","Thumbnail Packs","Editing Courses","Green Screen","Icons","Project Files","AI Resources"];
const NAMES = ["Rohan Verma","Aisha Khan","Karan Mehta","Priya Nair","Sameer Joshi","Ananya Iyer","Vikram Rao","Neha Gupta","Aditya Singh","Ishita Das"];
const PNOUNS = ["Cinematic Reels Pack","Neon Glow Transitions","VIP Thumbnail Kit","Motion Titles Vol.3","LUT Bundle — Moody Tones","AE Intro Template","DaVinci Color Suite","Creator SFX Bundle","Alight XML Master Pack","Premiere Speed Ramps","Glitch Transition Set","YouTube Thumbnail Pack"];

function seedProducts(){
  return Array.from({length:16}).map((_,i)=>({
    id:uidGen('prod'), title: PNOUNS[i%PNOUNS.length]+' '+(i+1),
    category: pick(CATEGORIES), price: pick([49,99,149,199,249,349,499,699]),
    discount: pick([0,0,10,20,30]), status:'published',
    downloads: randInt(120,9800), rating:(Math.random()*1.5+3.5).toFixed(1),
    size: randInt(20,900)+' MB', updated: fmtDate(daysAgo(randInt(1,60))),
    desc: "Professionally crafted asset pack built for fast-paced content creation — drag, drop, and publish."
  }));
}
function seedFreeAssets(){
  const free = ["Whoosh SFX Pack","Clean PNG Overlays","Bokeh Light Leaks","Retro Grain LUT","Emoji Sticker Pack","Background Score Loop","Green Screen Countdown","Minimal Icon Set"];
  return free.map((t,i)=>({ id:uidGen('free'), title:t, category:pick(CATEGORIES), size:randInt(5,150)+' MB', downloads:randInt(300,15000), tags:["trending","new"].filter(()=>Math.random()>0.5), updated:fmtDate(daysAgo(randInt(1,40))) }));
}
function seedWalletRequests(){ return []; }
function seedOrders(){ return []; }
function seedCustomers(){ return []; }
function seedSettings(){ return { banner:"VIP Store — 30% off cinematic packs this week", supportEmail:"azrworkingm@gmail.com", maintenance:false }; }
function seedNotifTemplates(){ return []; }

/* ================= APP STATE ================= */
let DB = { products:[], freeAssets:[], walletRequests:[], orders:[], customers:[], settings:{}, notifications:[] };
let state = { role:null, user:null, page:'home', adminPage:'overview', productModalId:null, wishlist:[] };

async function boot(){
  DB.products = await loadKey('ev-products', seedProducts);
  DB.freeAssets = await loadKey('ev-free-assets', seedFreeAssets);
  DB.walletRequests = await loadKey('ev-wallet-requests', seedWalletRequests);
  DB.orders = await loadKey('ev-orders', seedOrders);
  DB.customers = await loadKey('ev-customers', seedCustomers);
  DB.settings = await loadKey('ev-settings', seedSettings);
  DB.notifications = await loadKey('ev-notifications', seedNotifTemplates);

  // try auto-login
  let session = null;
  try{ const r = await window.storage.get('ev-session', false); session = r ? JSON.parse(r.value) : null; }catch(e){}
  if(session && session.email){
    document.getElementById('authEmail').value = session.email;
    loginWithEmail(session.email, true);
  }
}
boot();

/* ================= AUTH ================= */
function handleGoogleLogin(){
  const email = 'demo.creator'+randInt(10,99)+'@gmail.com';
  loginWithEmail(email);
}
function handleLogin(){
  const email = document.getElementById('authEmail').value.trim() || 'guest'+randInt(100,999)+'@example.com';
  const remember = document.getElementById('rememberMe').checked;
  loginWithEmail(email, false, remember);
}
async function loginWithEmail(email, silent=false, remember=true){
  if(email.toLowerCase() === 'pinverse85@gmail.com'){
    state.role='admin';
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appShell').style.display='none';
    document.getElementById('adminShell').style.display='block';
    if(remember) await saveKey('ev-session',{email});
    renderAdminNav(); renderAdmin();
    return;
  }
  let cust = DB.customers.find(c=>c.email===email);
  if(!cust){
    cust = { uid:uidGen('UID'), name: email.split('@')[0].replace(/[._]/g,' ').replace(/\b\w/g,c=>c.toUpperCase()), email,
      wallet: 250, purchases:[], downloads:[], wishlist:[], joined: fmtDate(new Date()), lastLogin: fmtDate(new Date()), status:'active' };
    DB.customers.push(cust);
    await saveKey('ev-customers', DB.customers);
    pushNotification(cust.uid, 'Welcome to EditVerse! We added ₹250 starter wallet credit.');
  } else {
    cust.lastLogin = fmtDate(new Date());
    await saveKey('ev-customers', DB.customers);
  }
  state.role='customer'; state.user=cust;
  if(remember) await saveKey('ev-session',{email});
  document.getElementById('authScreen').style.display='none';
  document.getElementById('adminShell').style.display='none';
  document.getElementById('appShell').style.display='block';
  ['icoSearchBar','icoWalletTop','icoBell'].forEach(()=>{});
  document.getElementById('icoSearchBar').innerHTML = icon('search',15,'var(--ink-soft)');
  document.getElementById('icoWalletTop').innerHTML = icon('wallet',16);
  document.getElementById('icoBell').innerHTML = icon('bell',16);
  buildTabIcons();
  buildDesktopNav();
  goPage('home');
}
async function logout(){
  try{ await window.storage.delete('ev-session', false); }catch(e){}
  state.role=null; state.user=null;
  document.getElementById('appShell').style.display='none';
  document.getElementById('adminShell').style.display='none';
  document.getElementById('authScreen').style.display='flex';
}

function buildTabIcons(){
  const map={home:'home',vip:'store',free:'gift',wallet:'wallet',profile:'user'};
  document.querySelectorAll('.tab-item').forEach(el=>{
    const t = el.dataset.tab;
    el.querySelector('.ic').innerHTML = icon(map[t],19);
  });
}
function buildDesktopNav(){
  const items=[['home','Home'],['vip','VIP Store'],['free','Free Assets'],['wallet','Wallet'],['profile','Profile']];
  document.getElementById('desktopNav').innerHTML = items.map(([id,label])=>
    `<a class="nav-link ${state.page===id?'active':''}" onclick="goPage('${id}')">${label}</a>`).join('');
}

/* ================= TOAST / MODAL ================= */
function showToast(msg){
  const root = document.getElementById('toastRoot');
  const el = document.createElement('div');
  el.className='toast fade-in';
  el.innerHTML = icon('check',15,'var(--green)')+`<span>${msg}</span>`;
  root.appendChild(el);
  setTimeout(()=>el.remove(),2600);
}
function openModal(html, wide=false){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box ${wide?'wide':''} fade-in">${html}</div>
    </div>`;
}
function closeModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* ================= NOTIFICATIONS ================= */
function pushNotification(userUid, msg){
  DB.notifications.unshift({ id:uidGen('ntf'), userUid, msg, time:new Date().toISOString(), read:false });
  saveKey('ev-notifications', DB.notifications);
  refreshNotifBadge();
}
function refreshNotifBadge(){
  if(!state.user) return;
  const count = DB.notifications.filter(n=>n.userUid===state.user.uid && !n.read).length;
  const badge = document.getElementById('notifBadge');
  if(count>0){ badge.style.display='flex'; badge.textContent=count>9?'9+':count; } else { badge.style.display='none'; }
}
function openNotifications(){
  const mine = DB.notifications.filter(n=>n.userUid===state.user.uid).slice(0,20);
  mine.forEach(n=>n.read=true);
  saveKey('ev-notifications', DB.notifications);
  refreshNotifBadge();
  openModal(`
    <div style="display:flex;align-items:center;justify-content:between;margin-bottom:14px;">
      <h3 style="margin:0;flex:1;">Notifications</h3>
      <button class="icon-btn" onclick="closeModal()">${icon('x',16)}</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${mine.length? mine.map(n=>`
        <div style="padding:12px;border-radius:14px;background:var(--line-soft);">
          <div style="font-size:13.5px;color:var(--ink);">${n.msg}</div>
          <div style="font-size:11px;color:var(--ink-faint);margin-top:4px;">${fmtDate(n.time)} · ${fmtTime(n.time)}</div>
        </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13.5px;">No notifications yet.</p>`}
    </div>
  `);
}

/* ================= SEARCH ================= */
function openSearch(){
  openModal(`
    <div class="search-bar glass" style="margin-bottom:14px;">
      ${icon('search',15,'var(--ink-soft)')}
      <input id="searchInput" autofocus placeholder="Search assets, templates, categories…" oninput="runSearch()" />
    </div>
    <div id="searchResults" style="display:flex;flex-direction:column;gap:8px;max-height:50vh;overflow-y:auto;"></div>
  `,true);
  setTimeout(()=>document.getElementById('searchInput').focus(),50);
}
function runSearch(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const results = document.getElementById('searchResults');
  if(!q){ results.innerHTML=''; return; }
  const p = DB.products.filter(x=>x.title.toLowerCase().includes(q)||x.category.toLowerCase().includes(q));
  const f = DB.freeAssets.filter(x=>x.title.toLowerCase().includes(q)||x.category.toLowerCase().includes(q));
  results.innerHTML = [...p.map(x=>({...x,kind:'vip'})),...f.map(x=>({...x,kind:'free'}))].slice(0,10).map(x=>`
    <div style="display:flex;align-items:center;gap:10px;padding:9px;border-radius:12px;" onclick="closeModal(); ${x.kind==='vip'?`openProduct('${x.id}')`:`downloadFree('${x.id}')`}">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13.5px;font-weight:600;">${x.title}</div>
        <div style="font-size:11.5px;color:var(--ink-soft);">${x.category} · ${x.kind==='vip'?'VIP':'Free'}</div>
      </div>
    </div>`).join('') || `<p style="color:var(--ink-soft);font-size:13px;">No results for “${q}”.</p>`;
}

/* ================= ROUTING ================= */
function goPage(page){
  state.page = page;
  document.querySelectorAll('.tab-item').forEach(el=> el.classList.toggle('active', el.dataset.tab===page));
  buildDesktopNav();
  renderPage();
  refreshNotifBadge();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderPage(){
  const c = document.getElementById('pageContent');
  if(DB.settings.maintenance){
    c.innerHTML = `<div class="card fade-in" style="padding:40px 20px;text-align:center;margin-top:40px;">
      <div style="font-size:34px;">🛠️</div><h2>We'll be right back</h2>
      <p style="color:var(--ink-soft);">EditVerse is under scheduled maintenance. Please check back soon.</p></div>`;
    return;
  }
  if(state.page==='home') c.innerHTML = renderHome();
  else if(state.page==='vip') c.innerHTML = renderVip();
  else if(state.page==='free') c.innerHTML = renderFree();
  else if(state.page==='wallet') c.innerHTML = renderWallet();
  else if(state.page==='profile') c.innerHTML = renderProfile();
  if(state.page==='wallet') initQR();
}

/* ================= VIP STORE ================= */
let vipCategoryFilter = 'All';
function renderVip(){
  const cats = ['All',...CATEGORIES];
  const items = DB.products.filter(p=>vipCategoryFilter==='All'||p.category===vipCategoryFilter);
  return `
    <div class="fade-in">
      <h1 style="font-size:21px;">VIP Premium Store</h1>
      <div class="row-scroll" style="margin-bottom:16px;">
        ${cats.map(c=>`<button class="cat-chip ${vipCategoryFilter===c?'active':''}" onclick="vipCategoryFilter='${c.replace(/'/g,"\\'")}';renderPage()">${c}</button>`).join('')}
      </div>
      <div class="grid-products">
        ${items.map(p=>productCardFull(p)).join('')}
      </div>
    </div>`;
}
function productCardFull(p){
  const priced = p.price - Math.round(p.price*p.discount/100);
  const wished = state.user.wishlist.includes(p.id);
  return `<div class="card pcard">
    <div class="prod-thumb" style="height:100px;border-radius:20px 20px 0 0;" onclick="openProduct('${p.id}')">${icon('grid',26,'rgba(255,255,255,0.85)')}</div>
    <div class="pcard-body">
      <div style="font-size:13px;font-weight:600;line-height:1.3;">${p.title}</div>
      <div style="font-size:11px;color:var(--ink-faint);margin:3px 0 8px;">${p.category}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <span style="font-weight:700;">${fmtINR(priced)}</span>
          ${p.discount>0?`<span style="font-size:11px;color:var(--ink-faint);text-decoration:line-through;margin-left:4px;">${fmtINR(p.price)}</span>`:''}
        </div>
        <button class="icon-btn" style="background:${wished?'#FDECEC':'#F0F0F5'};" onclick="toggleWishlist('${p.id}')">${icon('heart',15,wished?'var(--red)':'var(--ink-soft)',wished?'var(--red)':'none')}</button>
      </div>
    </div></div>`;
}
function openProduct(id){
  const p = DB.products.find(x=>x.id===id);
  const priced = p.price - Math.round(p.price*p.discount/100);
  const owned = state.user.purchases.includes(id);
  openModal(`
    <div class="prod-thumb" style="height:150px;">${icon('grid',40,'rgba(255,255,255,0.85)')}</div>
    <h3 style="margin:14px 0 2px;">${p.title}</h3>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;">${p.category} · ${p.size} · Updated ${p.updated}</div>
    <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;">${p.desc}</p>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12.5px;color:var(--ink-faint);">
      <span>★ ${p.rating} rating</span><span>·</span><span>${p.downloads.toLocaleString('en-IN')} downloads</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div><span style="font-size:20px;font-weight:800;">${fmtINR(priced)}</span>
      ${p.discount>0?`<span style="font-size:12.5px;color:var(--ink-faint);text-decoration:line-through;margin-left:6px;">${fmtINR(p.price)}</span>`:''}</div>
      <div style="display:flex;gap:8px;">
        <button class="icon-btn glass" onclick="toggleWishlist('${p.id}');openProduct('${p.id}')">${icon('heart',16,state.user.wishlist.includes(p.id)?'var(--red)':'var(--ink-soft)', state.user.wishlist.includes(p.id)?'var(--red)':'none')}</button>
        <button class="icon-btn glass" onclick="shareProduct('${p.id}')">${icon('share',16)}</button>
      </div>
    </div>
    ${owned
      ? `<button class="btn btn-primary" style="width:100%;" onclick="downloadPurchase('${p.id}')">${icon('download',16,'#fff')} Download now</button>`
      : `<button class="btn btn-primary" style="width:100%;" onclick="buyProduct('${p.id}')">Buy with wallet — ${fmtINR(priced)}</button>`}
  `, true);
}
async function toggleWishlist(id){
  const i = state.user.wishlist.indexOf(id);
  if(i>-1) state.user.wishlist.splice(i,1); else state.user.wishlist.push(id);
  await saveKey('ev-customers', DB.customers);
  renderPage();
}
function shareProduct(id){
  const p = DB.products.find(x=>x.id===id);
  if(navigator.share){ navigator.share({title:p.title, text:'Check out '+p.title+' on EditVerse'}); }
  else showToast('Link copied to clipboard');
}
async function buyProduct(id){
  const p = DB.products.find(x=>x.id===id);
  const priced = p.price - Math.round(p.price*p.discount/100);
  if(state.user.wallet < priced){
    closeModal();
    showToast('Insufficient wallet balance — recharge to continue');
    goPage('wallet');
    return;
  }
  state.user.wallet -= priced;
  state.user.purchases.push(id);
  await saveKey('ev-customers', DB.customers);
  DB.orders.unshift({ id:uidGen('ord'), userUid:state.user.uid, user:state.user.name, product:p.title, amount:priced, date:new Date().toISOString(), status:'completed' });
  await saveKey('ev-orders', DB.orders);
  pushNotification(state.user.uid, `Purchase successful — ${p.title} unlocked.`);
  closeModal(); showToast('Purchase successful — download unlocked');
  renderPage();
}
function downloadPurchase(id){ closeModal(); showToast('Download started'); }

async function downloadFree(id){
  const f = DB.freeAssets.find(x=>x.id===id);
  f.downloads++;
  await saveKey('ev-free-assets', DB.freeAssets);
  if(!state.user.downloads.includes(id)){ state.user.downloads.push(id); await saveKey('ev-customers', DB.customers); }
  showToast(`Downloading “${f.title}”…`);
  closeModal();
}

async function saveProduct(id){
  const data = {
    title: document.getElementById('pf_title').value || 'Untitled asset',
    category: document.getElementById('pf_category').value,
    price: Number(document.getElementById('pf_price').value)||0,
    discount: Number(document.getElementById('pf_discount').value)||0,
    status: document.getElementById('pf_status').value,

  if(id){

    DB.products.unshift({ id:uidGen('prod'), ...data, downloads:0, rating:'—', size:'—', updated:fmtDate(new Date()), desc:'Freshly uploaded EditVerse asset.' });

  await saveKey('ev-products', DB.products);
  closeModal(); showToast(id?'Product updated':'Product uploaded'); renderAdmin();

async function decideRequest(id, decision){
  const r = DB.walletRequests.find(x=>x.id===id);
  r.status = decision;
  await saveKey('ev-wallet-requests', DB.walletRequests);
  if(decision==='approved'){
    const cust = DB.customers.find(c=>c.uid===r.userUid);
    if(cust){ cust.wallet += r.amount; await saveKey('ev-customers', DB.customers); }
    pushNotification(r.userUid, `Recharge of ${fmtINR(r.amount)} approved and credited to your wallet.`);
  } else {
    pushNotification(r.userUid, `Recharge request of ${fmtINR(r.amount)} was rejected.`);
  }
  showToast(decision==='approved'?`${fmtINR(r.amount)} credited to ${r.username}`:`Request rejected`);
  renderAdminNav(); renderAdmin();
}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
      ${[['UID',u.uid],['Wallet',fmtINR(u.wallet)],['Purchases',u.purchases.length],['Downloads',u.downloads.length],['Joined',u.joined],['Last login',u.lastLogin]].map(([l,v])=>`
        <div style="background:var(--line-soft);padding:10px;border-radius:12px;"><div style="font-size:11px;color:var(--ink-soft);">${l}</div><div style="font-weight:600;">${v}</div></div>`).join('')}
    </div>`);
}
async function toggleUser(uid){
  const u = DB.customers.find(x=>x.uid===uid);
  u.status = u.status==='active'?'disabled':'active';
  await saveKey('ev-customers', DB.customers);
  showToast('User status updated'); renderAdmin();
}

function adminOrders(){
  return `
    <h1 style="font-size:22px;margin-bottom:16px;">Orders</h1>
    <div class="card" style="overflow-x:auto;">
      <table>
        <thead><tr><th>Order ID</th><th>User</th><th>Product</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
        <tbody>
        ${DB.orders.length ? DB.orders.map(o=>`
          <tr><td style="font-size:11.5px;color:var(--ink-soft);">${o.id}</td><td style="font-weight:600;">${o.user}</td>
          <td style="color:var(--ink-soft);">${o.product}</td><td>${fmtINR(o.amount)}</td>
          <td style="font-size:11.5px;color:var(--ink-soft);">${fmtDate(o.date)}</td><td>${statusPillAdmin(o.status)}</td></tr>`).join('')
          : `<tr><td colspan="6" style="text-align:center;color:var(--ink-faint);padding:24px;">No orders placed yet.</td></tr>`}
        </tbody>
      </table>
    </div>`;
}

function adminMonitoring(){
  const logs = [
    ['Download failed: ZIP checksum mismatch','warning'],
    ['Payment gateway timeout on verification callback','critical'],
    ['404: Missing thumbnail for product asset','info'],
    ['Storage bucket approaching 85% capacity','warning'],
  ];
  return `
    <h1 style="font-size:22px;margin-bottom:16px;">System Monitoring</h1>
    ${healthStrip()}
    <div class="stat-grid" style="margin-top:14px;">
      ${statCard('Storage used','68%','var(--accent2)','monitor')}
      ${statCard('Failed downloads (24h)','3','var(--amber)','download')}
      ${statCard('Broken links','1','var(--red)','x')}
      ${statCard('Avg response time','184ms','var(--green)','chart')}
    </div>
    <div class="card" style="margin-top:16px;padding:16px;">
      <h3 style="margin:0 0 10px;font-size:14px;">Error & activity logs</h3>
      ${logs.map(([m,l])=>`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-soft);">
        ${statusPillAdmin(l==='critical'?'disabled':l==='warning'?'scheduled':'active')}<span style="font-size:13px;flex:1;">${m}</span></div>`).join('')}
    </div>`;
}

function adminSettings(){
  return `
    <h1 style="font-size:22px;margin-bottom:16px;">Website Settings</h1>
    <div class="card" style="padding:18px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${icon('megaphone',16,'var(--accent)')}<h3 style="margin:0;font-size:14px;">Homepage banner</h3></div>
      <span class="label">Banner text</span>
      <input class="input" id="set_banner" value="${DB.settings.banner}"/>
      <span class="label" style="margin-top:10px;">Support email</span>
      <input class="input" id="set_support" value="${DB.settings.supportEmail}"/>
      <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="saveSettings()">Save changes</button>
    </div>
    <div class="card" style="padding:18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">${icon('shield',16,'var(--green)')}<h3 style="margin:0;font-size:14px;">Maintenance mode</h3></div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;">Temporarily disable the storefront for all customers.</p>
      <button class="btn ${DB.settings.maintenance?'btn-gold':'btn-ghost'} btn-sm" onclick="toggleMaintenance()">${DB.settings.maintenance?'Disable maintenance mode':'Enable maintenance mode'}</button>
    </div>`;
}
async function saveSettings(){
  DB.settings.banner = document.getElementById('set_banner').value;
  DB.settings.supportEmail = document.getElementById('set_support').value;
  await saveKey('ev-settings', DB.settings);
  showToast('Settings saved');
}
async function toggleMaintenance(){
  DB.settings.maintenance = !DB.settings.maintenance;
  await saveKey('ev-settings', DB.settings);
  showToast(DB.settings.maintenance?'Maintenance mode enabled':'Maintenance mode disabled');
  renderAdmin();
}
</script>
</body>
</html>
