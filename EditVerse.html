<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>EditVerse — Premium Video Editing Marketplace</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ink:#15161B; --ink-soft:#5B5D6B; --ink-faint:#9A9CAB;
  --bg:#F3F4F9; --card:#ffffff;
  --accent:#6D5DF6; --accent2:#4F8EF7; --gold:#D8A84E;
  --green:#2FB380; --red:#E15554; --amber:#DDA22B;
  --line:#ECECF2; --line-soft:#F5F5F9;
  --radius:22px; --radius-sm:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
h1,h2,h3,.display{font-family:'Plus Jakarta Sans',sans-serif;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit;cursor:pointer;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#D8D9E4;border-radius:8px;}
.glass{background:rgba(255,255,255,0.72);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.6);box-shadow:0 8px 32px rgba(31,32,56,0.06);}
.card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 16px rgba(20,20,40,0.05);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:16px;font-weight:600;font-size:14px;transition:transform .15s ease;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-ghost{background:#F0F0F5;color:var(--ink-soft);}
.btn-gold{background:var(--gold);color:#fff;}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:12px;}
.input{width:100%;padding:12px 14px;border-radius:14px;border:1px solid var(--line);font-size:14px;outline:none;background:#fff;color:var(--ink);}
.input:focus{border-color:var(--accent);}
.input-wrap{position:relative;}
.input-wrap .input{padding-left:40px;}
.input-wrap .ic-left{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);}
.input-wrap .ic-right{position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--ink-faint);cursor:pointer;}
.label{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;display:block;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:99px;font-size:11.5px;font-weight:600;}
.dot{width:6px;height:6px;border-radius:50%;}
.container{max-width:1200px;margin:0 auto;padding:0 18px;}
.grid{display:grid;gap:16px;}
.flex{display:flex;}
.row-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.row-scroll::-webkit-scrollbar{display:none;}
.fade-in{animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:400;background:var(--ink);color:#fff;padding:12px 20px;border-radius:16px;font-size:13.5px;font-weight:500;box-shadow:0 12px 32px rgba(0,0,0,0.25);display:flex;align-items:center;gap:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(20,20,30,0.4);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:500;padding:16px;}
.modal-box{background:#fff;border-radius:26px;padding:24px;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,0.22);}
.modal-box.wide{max-width:640px;}
.badge-num{position:absolute;top:-4px;right:-4px;background:var(--red);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 3px;}
.icon-btn{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;position:relative;}
.hidden{display:none !important;}

/* Auth screen */
#authScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(circle at 20% 20%,#EDE9FF 0%,transparent 45%),radial-gradient(circle at 80% 80%,#E5F0FF 0%,transparent 45%),var(--bg);}
.auth-card{width:100%;max-width:410px;padding:32px 26px;}
.auth-logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:22px;margin:0 auto 16px;}
.auth-tabs{display:flex;background:#F0F0F5;border-radius:14px;padding:4px;margin-bottom:22px;}
.auth-tab{flex:1;text-align:center;padding:9px 0;border-radius:11px;font-size:13px;font-weight:700;color:var(--ink-soft);}
.auth-tab.active{background:#fff;color:var(--ink);box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.feature-strip{display:flex;justify-content:center;gap:14px;margin-top:20px;font-size:11px;color:var(--ink-faint);flex-wrap:wrap;}

/* App shell */
#appShell{display:none;}
.topbar{position:sticky;top:0;z-index:100;padding:12px 0;background:rgba(243,244,249,0.85);backdrop-filter:blur(14px);}
.search-bar{display:flex;align-items:center;gap:8px;padding:11px 15px;border-radius:16px;flex:1;}
.search-bar input{border:none;outline:none;background:transparent;flex:1;font-size:14px;}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;justify-content:space-around;padding:10px 6px calc(10px + env(safe-area-inset-bottom));background:rgba(255,255,255,0.9);backdrop-filter:blur(20px);border-top:1px solid var(--line);}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--ink-faint);padding:4px 10px;border-radius:12px;}
.tab-item.active{color:var(--accent);}
.page-content{padding:16px 0 100px;}
.prod-card{width:168px;flex-shrink:0;}
.prod-thumb{height:110px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.prod-thumb img{width:100%;height:100%;object-fit:cover;}
.cat-chip{padding:9px 15px;border-radius:14px;font-size:12.5px;font-weight:600;white-space:nowrap;background:#fff;color:var(--ink-soft);border:1px solid var(--line);}
.cat-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.section-title{font-size:16px;font-weight:700;margin:22px 0 12px;display:flex;align-items:center;justify-content:space-between;}
.grid-products{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.pcard{padding:0;overflow:hidden;}
.pcard-body{padding:12px;}
.qr-box{width:180px;height:180px;margin:0 auto;padding:10px;background:#fff;border-radius:18px;display:flex;align-items:center;justify-content:center;border:1px solid var(--line);}
.amount-chip{padding:10px 0;text-align:center;border-radius:14px;border:1.5px solid var(--line);font-weight:700;font-size:14px;}
.amount-chip.active{border-color:var(--accent);background:#EDEBFF;color:var(--accent);}
.empty-state{text-align:center;padding:34px 18px;color:var(--ink-soft);}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--ink-faint);padding:10px 12px;border-bottom:1px solid var(--line);}
td{padding:11px 12px;border-bottom:1px solid var(--line-soft);}
.thumb-upload{width:100%;height:140px;border-radius:16px;border:1.5px dashed var(--line);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#FAFAFD;cursor:pointer;}
.thumb-upload img{width:100%;height:100%;object-fit:cover;}

/* Admin */
#adminShell{display:none;}
.admin-layout{display:flex;min-height:100vh;position:relative;}
.admin-sidebar{width:236px;padding:20px 14px;height:100vh;background:rgba(255,255,255,0.96);border-right:1px solid var(--line);flex-shrink:0;
  position:fixed;left:0;top:0;z-index:300;transform:translateX(-100%);transition:transform .2s;overflow-y:auto;}
.admin-sidebar.open{transform:translateX(0);}
.admin-nav-item{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:14px;font-size:13.5px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;}
.admin-nav-item.active{background:#EDEBFF;color:var(--accent);}
.admin-main{flex:1;min-width:0;padding:18px 16px 60px;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.stat-card{padding:18px;}
.health-strip{display:flex;flex-wrap:wrap;gap:22px;align-items:center;padding:16px 20px;}
.pulse{width:9px;height:9px;border-radius:50%;position:relative;}
.pulse::after{content:'';position:absolute;inset:-4px;border-radius:50%;background:inherit;opacity:.35;animation:pulseAnim 1.6s infinite;}
@keyframes pulseAnim{0%{transform:scale(1);opacity:.5;}100%{transform:scale(2.1);opacity:0;}}
.spark{display:flex;align-items:flex-end;gap:5px;height:120px;}
.spark div{flex:1;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--accent),var(--accent2));min-height:3px;}
.admin-mobile-bar{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.admin-backdrop{display:none;position:fixed;inset:0;background:rgba(15,16,25,0.4);z-index:290;}
.admin-backdrop.show{display:block;}
.type-toggle{display:inline-flex;background:#F0F0F5;border-radius:12px;padding:3px;}
.type-toggle button{padding:7px 14px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--ink-soft);}
.type-toggle button.active{background:#fff;color:var(--accent);box-shadow:0 2px 6px rgba(0,0,0,0.06);}
.bar-track{height:8px;border-radius:6px;background:var(--line-soft);overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .3s ease;}

/* Lock the whole app to one consistent mobile-width frame on every screen size —
   no separate desktop layout, no reflow/zoom weirdness on larger screens. */
html,body{background:#DEDFE8;}
#appFrame{
  max-width:480px; margin:0 auto; min-height:100vh; position:relative;
  background:var(--bg); box-shadow:0 0 60px rgba(20,20,40,0.12); overflow-x:hidden;
  transform:translateZ(0); /* creates a containing block so fixed children stay inside this frame, not the full browser window */
}
</style>
</head>
<body>
<div id="appFrame">

<!-- ============ AUTH SCREEN ============ -->
<div id="authScreen">
  <div class="auth-card card glass fade-in">
    <div class="auth-logo">E</div>
    <h2 style="margin:0 0 4px;font-size:21px;text-align:center;">EditVerse</h2>
    <p style="margin:0 0 20px;font-size:13px;color:var(--ink-soft);text-align:center;">Premium video editing assets for Indian creators.</p>

    <div class="auth-tabs">
      <button class="auth-tab" id="tabSignin" onclick="setAuthMode('signin')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="setAuthMode('signup')">Create Account</button>
    </div>

    <div id="nameField" style="margin-bottom:14px;display:none;">
      <span class="label">Full name</span>
      <div class="input-wrap"><span class="ic-left" id="icoName"></span><input class="input" id="authName" placeholder="Your name" /></div>
    </div>
    <div id="referralField" style="margin-bottom:14px;display:none;">
      <span class="label">Referral code <span style="color:var(--ink-faint);font-weight:500;">(optional)</span></span>
      <input class="input" id="authReferral" placeholder="e.g. 482913" />
    </div>
    <div style="margin-bottom:14px;">
      <span class="label">Email</span>
      <div class="input-wrap"><span class="ic-left" id="icoMail"></span><input class="input" id="authEmail" type="email" placeholder="you@example.com" /></div>
    </div>
    <div style="margin-bottom:8px;">
      <span class="label">Password</span>
      <div class="input-wrap"><span class="ic-left" id="icoLock"></span>
        <input class="input" id="authPassword" type="password" placeholder="••••••••" />
        <span class="ic-right" id="icoEye" onclick="togglePw()"></span>
      </div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;font-size:12.5px;color:var(--ink-soft);">
      <label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="rememberMe" checked/> Remember me</label>
      <a style="color:var(--accent);font-weight:600;" onclick="openForgotPassword()">Forgot password?</a>
    </div>
    <button class="btn btn-primary" style="width:100%;" id="authSubmitBtn" onclick="handleLogin()">Sign in</button>
    <div style="display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--ink-faint);font-size:11.5px;">
      <div style="flex:1;height:1px;background:var(--line);"></div>OR<div style="flex:1;height:1px;background:var(--line);"></div>
    </div>
    <button class="btn btn-ghost" style="width:100%;" onclick="handleGoogleLogin()">Continue with Google</button>

    <div class="feature-strip">
      <span>🔒 Secure wallet</span><span>⚡ Instant downloads</span><span>🎬 Premium assets</span>
    </div>
  </div>
</div>

<!-- ============ CUSTOMER APP SHELL ============ -->
<div id="appShell">
  <div class="topbar">
    <div class="container flex" style="align-items:center;gap:10px;">
      <div style="display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;">
        <div style="width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;">E</div>
        EditVerse
      </div>
      <nav class="desktop-nav" id="desktopNav" style="margin-left:18px;display:none;"></nav>
      <div class="search-bar glass" style="margin-left:auto;max-width:320px;" onclick="openSearch()">
        <span id="icoSearchBar"></span>
        <input placeholder="Search assets, templates…" readonly />
      </div>
      <button class="icon-btn glass" onclick="goPage('wallet')" title="Wallet"><span id="icoWalletTop"></span></button>
      <button class="icon-btn glass" onclick="openNotifications()" title="Notifications">
        <span id="icoBell"></span>
        <span class="badge-num" id="notifBadge" style="display:none;"></span>
      </button>
    </div>
  </div>
  <div class="container page-content" id="pageContent"></div>

  <div class="tabbar">
    <button class="tab-item" data-tab="home" onclick="goPage('home')"><span class="ic"></span>Home</button>
    <button class="tab-item" data-tab="vip" onclick="goPage('vip')"><span class="ic"></span>VIP Store</button>
    <button class="tab-item" data-tab="free" onclick="goPage('free')"><span class="ic"></span>Free</button>
    <button class="tab-item" data-tab="wallet" onclick="goPage('wallet')"><span class="ic"></span>Wallet</button>
    <button class="tab-item" data-tab="profile" onclick="goPage('profile')"><span class="ic"></span>Profile</button>
  </div>
</div>

<!-- ============ ADMIN SHELL ============ -->
<div id="adminShell">
  <div class="admin-layout">
    <aside class="admin-sidebar" id="adminSidebar">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:24px;padding:0 4px;">
        <div style="width:34px;height:34px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;">E</div>
        <div><div style="font-weight:700;font-size:13.5px;">EditVerse</div><div style="font-size:11px;color:var(--ink-soft);">Admin Console</div></div>
      </div>
      <div id="adminNav"></div>
      <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--line);display:flex;align-items:center;gap:9px;">
        <div style="width:32px;height:32px;border-radius:99px;background:var(--gold);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">A</div>
        <div style="min-width:0;"><div style="font-size:12px;font-weight:600;">Primary Admin</div><div style="font-size:10.5px;color:var(--ink-soft);">Full access</div></div>
      </div>
      <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:14px;" onclick="logout()">Log out</button>
    </aside>
    <div class="admin-backdrop" id="adminBackdrop" onclick="toggleAdminSidebar()"></div>
    <main class="admin-main">
      <div class="admin-mobile-bar">
        <button class="icon-btn glass" onclick="toggleAdminSidebar()"><span id="icoMenu"></span></button>
        <div style="font-weight:800;font-size:15px;">EditVerse Admin</div>
      </div>
      <div id="adminContent"></div>
    </main>
  </div>
</div>

<div id="modalRoot"></div>
<div id="toastRoot"></div>
</div>

<script>
/* ================= ICONS ================= */
const ICONS = {
  home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',
  store:'<path d="M3 7l1-4h16l1 4"/><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M9 20v-6h6v6"/>',

  wallet:'<path d="M3 7a2 2 0 0 1 2-2h13a1 1 0 0 1 1 1v3"/><path d="M3 7v11a2 2 0 0 0 2 2h14a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1H6a2 2 0 0 1-2-2z"/><circle cx="16" cy="14" r="1"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/>',

  lock:'<rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>',

  eyeOff:'<path d="M17.9 17.9A10.9 10.9 0 0 1 12 20c-7 0-11-8-11-8a19 19 0 0 1 5.1-5.9M9.9 4.2A10 10 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.2 3.3M14.1 14.1a3 3 0 1 1-4.2-4.2"/><path d="M1 1l22 22"/>',
  search:'<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
  heart:'<path d="M12 21s-7-4.5-9.5-9C.5 8 2 4 6 4c2.2 0 3.7 1.3 4.5 2.5C11.3 5.3 12.8 4 15 4c4 0 5.5 4 3.5 8-2.5 4.5-9.5 9-9.5 9z"/>',
  share:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.6l6.8-3.8M8.6 13.4l6.8 3.8"/>',

  copy:'<rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
  refresh:'<path d="M20 11A8 8 0 1 0 6 5.3L3 8"/><path d="M3 3v5h5"/>',
  check:'<path d="M20 6L9 17l-5-5"/>',
  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  edit:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>',
  trash:'<path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/>',
  chart:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>',
  shield:'<path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/>',
  settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>',
  arrow:'<path d="M5 12h14M13 6l6 6-6 6"/>',

/* ================= STORAGE HELPERS =================
   Product catalog, orders, customers, wallet requests and settings are stored as
   SHARED data so every person using this app sees the same admin-managed catalog.
   Only the login session token is kept private per device. LocalStorage is used as
   a mirror/fallback so data also survives refreshes when this file is opened outside
   the Claude.ai preview (e.g. self-hosted). */
async function loadKey(key, seedFn){
  const shared = key !== 'ev-session';
  if(window.storage){
    try{
      const res = await window.storage.get(key, shared);
      if(res){ try{ localStorage.setItem(key, res.value); }catch(e){} return JSON.parse(res.value); }
    }catch(e){ /* not created yet in this scope — fall through */ }
  }
  try{
    const raw = localStorage.getItem(key);
    if(raw) return JSON.parse(raw);
  }catch(e){ /* localStorage unavailable */ }
  const seeded = seedFn();
  await saveKey(key, seeded);
  return seeded;
}
async function saveKey(key,value){
  const shared = key !== 'ev-session';
  const json = JSON.stringify(value);
  try{ localStorage.setItem(key, json); }catch(e){ /* not available here — ignore */ }
  if(window.storage){
    try{ await window.storage.set(key, json, shared); return true; }
    catch(e){ console.error('storage error',e); return false; }
  }
  return true;
}

const fmtINR = n => '₹'+Number(n).toLocaleString('en-IN');
const daysAgo = n => { const d=new Date(); d.setDate(d.getDate()-n); return d; };
const fmtDate = d => new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime = d => new Date(d).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
function initials(name){ return (name||'U').split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }
function slugify(title){ return (title||'asset').toLowerCase().trim().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'') || 'asset'; }
function uniqueSlug(title, excludeId){
  let base = slugify(title), slug = base, i=1;
  while(DB.products.some(p=>p.slug===slug && p.id!==excludeId)){ slug = base+'-'+i; i++; }
  return slug;
}
function productLink(slug){ return `${location.origin}${location.pathname}#/product/${slug}`; }
function resizeImageFile(file, maxW=480, quality=0.7){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = Math.max(1, Math.round(img.width * Math.min(1, maxW/img.width)));
        let h = Math.max(1, Math.round(img.height * (w/img.width)));
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        let q = quality;
        let dataUrl = canvas.toDataURL('image/jpeg', q);
        let attempts = 0;
        // Keep shrinking until the encoded thumbnail is safely small (under ~300KB)
        while(dataUrl.length > 300000 && attempts < 7){
          q = Math.max(0.35, q - 0.12);
          w = Math.max(60, Math.round(w*0.82)); h = Math.max(60, Math.round(h*0.82));
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          dataUrl = canvas.toDataURL('image/jpeg', q);
          attempts++;
        }
        resolve(dataUrl);
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}

/* Sends the account's password to the user's inbox via EmailJS (free, client-side email API — no backend needed).
   To activate: create a free account at https://www.emailjs.com, then fill in the three values below. */
const EMAILJS_SERVICE_ID = "";   // e.g. "service_xxxxxxx"
const EMAILJS_TEMPLATE_ID = "";  // e.g. "template_xxxxxxx"
const EMAILJS_PUBLIC_KEY = "";   // e.g. "AbCdEfGhIjKlMnOp"
async function sendPasswordEmail(toEmail, toName, password){
  if(!EMAILJS_SERVICE_ID || !EMAILJS_TEMPLATE_ID || !EMAILJS_PUBLIC_KEY) return false;
  try{
    const res = await fetch('https://api.emailjs.com/api/v1.0/email/send', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ service_id:EMAILJS_SERVICE_ID, template_id:EMAILJS_TEMPLATE_ID, user_id:EMAILJS_PUBLIC_KEY,
        template_params:{ to_email:toEmail, to_name:toName, user_password:password } })
    });
    return res.ok;
  }catch(e){ console.error('EmailJS error', e); return false; }
}

      <p style="color:var(--ink-soft);">EditVerse is under scheduled maintenance. Please check back soon.</p></div>`;
    return;
  }
  if(state.page==='home') c.innerHTML = renderHome();
  else if(state.page==='vip') c.innerHTML = renderVip();
  else if(state.page==='free') c.innerHTML = renderFree();
  else if(state.page==='wallet') c.innerHTML = renderWallet();
  else if(state.page==='profile') c.innerHTML = renderProfile();
  if(state.page==='wallet') initQR();
}

function thumbBlock(p, height='110px', radius='16px 16px 0 0'){
  if(p.thumbnail) return `<div class="prod-thumb" style="height:${height};border-radius:${radius};background:#EDEDF3;"><img src="${p.thumbnail}"/></div>`;
  const bg = p.type==='free' ? 'linear-gradient(135deg,var(--green),#59D3A5)' : 'linear-gradient(135deg,var(--accent),var(--accent2))';
  return `<div class="prod-thumb" style="height:${height};border-radius:${radius};background:${bg};">${icon(p.type==='free'?'gift':'grid',24,'rgba(255,255,255,0.9)')}</div>`;
}

function openProduct(id){
  const p = DB.products.find(x=>x.id===id);
  if(!p) return;
  const priced = p.type==='premium' ? p.price - Math.round(p.price*p.discount/100) : 0;
  const owned = p.type==='free' || state.user.purchases.includes(id);
  location.hash = `#/product/${p.slug}`;
  openModal(`
    ${thumbBlock(p,'150px','18px')}
    <h3 style="margin:14px 0 2px;">${p.title}</h3>
    <div style="font-size:12.5px;color:var(--ink-soft);margin-bottom:10px;">${p.category}${p.size?` · ${p.size}`:''} · Updated ${p.updated}</div>
    <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.5;">${p.description || 'No description provided.'}</p>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0;font-size:12.5px;color:var(--ink-faint);"><span>${p.downloads} downloads</span></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
      <div>${p.type==='premium' ? `<span style="font-size:20px;font-weight:800;">${fmtINR(priced)}</span>${p.discount>0?`<span style="font-size:12.5px;color:var(--ink-faint);text-decoration:line-through;margin-left:6px;">${fmtINR(p.price)}</span>`:''}` : `<span style="font-size:20px;font-weight:800;color:var(--green);">Free</span>`}</div>
      <div style="display:flex;gap:8px;">
        <button class="icon-btn glass" onclick="toggleWishlist('${p.id}');openProduct('${p.id}')">${icon('heart',16,state.user.wishlist.includes(p.id)?'var(--red)':'var(--ink-soft)', state.user.wishlist.includes(p.id)?'var(--red)':'none')}</button>
        <button class="icon-btn glass" onclick="shareProduct('${p.id}')">${icon('share',16)}</button>
      </div>
    </div>
    ${owned
      ? `<button class="btn btn-primary" style="width:100%;" onclick="downloadAsset('${p.id}')">${icon('download',16,'#fff')} Download now</button>`
      : `<button class="btn btn-primary" style="width:100%;" onclick="buyProduct('${p.id}')">Buy with wallet — ${fmtINR(priced)}</button>`}
  `, true);
}
async function toggleWishlist(id){
  const i = state.user.wishlist.indexOf(id);
  if(i>-1) state.user.wishlist.splice(i,1); else state.user.wishlist.push(id);
  await saveKey('ev-customers', DB.customers); renderPage();
}
function shareProduct(id){
  const p = DB.products.find(x=>x.id===id);
  const url = productLink(p.slug);
  if(navigator.share){ navigator.share({title:p.title, text:p.description||p.title, url}); }
  else { navigator.clipboard?.writeText(url); showToast('Product link copied'); }
}
async function buyProduct(id){
  const p = DB.products.find(x=>x.id===id);
  const priced = p.price - Math.round(p.price*p.discount/100);
  if(state.user.wallet < priced){ closeModal(); showToast('Insufficient wallet balance — recharge to continue'); goPage('wallet'); return; }
  state.user.wallet -= priced; state.user.purchases.push(id);
  await saveKey('ev-customers', DB.customers);
  DB.orders.unshift({ id:uidGen('ord'), userUid:state.user.uid, user:state.user.name, product:p.title, amount:priced, date:new Date().toISOString(), status:'completed' });
  await saveKey('ev-orders', DB.orders);
  pushNotification(state.user.uid, `Purchase successful — ${p.title} unlocked.`);
  closeModal(); showToast('Purchase successful — download unlocked'); renderPage();
}
async function downloadAsset(id){
  const p = DB.products.find(x=>x.id===id);
  if(!p.downloadLink){ showToast('Download link not available yet — contact support'); return; }
  p.downloads++; await saveKey('ev-products', DB.products);
  if(!state.user.downloads.includes(id)){ state.user.downloads.push(id); await saveKey('ev-customers', DB.customers); }
  window.open(p.downloadLink, '_blank');
  showToast(`Downloading "${p.title}"…`); closeModal();
}

      </div>

function statusPill(status){
  const map = {pending:['var(--amber)','Pending'],approved:['var(--green)','Successful'],rejected:['var(--red)','Failed']};
  const [c,l] = map[status]||['var(--ink-faint)',status];
  return `<span class="pill" style="background:${c}1A;color:${c};"><span class="dot" style="background:${c};"></span>${l}</span>`;
}
/* selectAmount only touches the amount chips + the recharge box — it never rebuilds the
   whole page, so the custom-amount <input> keeps focus and the on-screen keyboard stays open
   while typing. The draft recharge is also saved to the customer record immediately, so the
   QR + UTR step survives a page reload (e.g. switching to a UPI app and back). */
async function selectAmount(amount){
  if(!amount || amount<=0) return;
  if(!currentRecharge || currentRecharge.amount !== amount){
    currentRecharge = { amount, ref: uidGen('TXN').toUpperCase() };
    state.user.pendingRecharge = { amount: currentRecharge.amount, ref: currentRecharge.ref, createdAt:new Date().toISOString() };
    await saveKey('ev-customers', DB.customers);
  }
  updateRechargeUI();
}
function updateRechargeUI(){
  document.querySelectorAll('#amountChipRow .amount-chip').forEach(el=>{
    el.classList.toggle('active', currentRecharge && Number(el.dataset.amt)===currentRecharge.amount);
  });
  const wrap = document.getElementById('rechargeBoxWrap');
  if(!wrap) return;
  wrap.innerHTML = currentRecharge ? renderRechargeBox() : '';
  if(currentRecharge) initQR();
}
function renderRechargeBox(){
  return `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--line);">
    <div id="qrHolder" class="qr-box"></div>
    <div style="text-align:center;margin-top:10px;font-size:13px;color:var(--ink-soft);">Scan with any UPI app to pay <b>${fmtINR(currentRecharge.amount)}</b></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="copyText('${DB.settings.upiId}')">${icon('copy',13)} UPI ID</button>
      <button class="btn btn-ghost btn-sm" style="flex:1;" onclick="copyText('${currentRecharge.ref}')">${icon('copy',13)} Reference</button>
      <button class="btn btn-ghost btn-sm" onclick="selectAmount(currentRecharge.amount)">${icon('refresh',13)}</button>
    </div>
    <div style="margin-top:14px;"><span class="label">Enter UTR number</span><input class="input" id="utrInput" placeholder="12 digit UTR from your bank app" /></div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="submitUTR()">Verify payment</button>
  </div>`;
}
function initQR(){
  const holder = document.getElementById('qrHolder');
  if(!holder || !currentRecharge) return;
  holder.innerHTML='';
  const upiStr = `upi://pay?pa=${encodeURIComponent(DB.settings.upiId)}&pn=EditVerse&am=${currentRecharge.amount}&tr=${currentRecharge.ref}&tn=EditVerse%20Wallet%20Recharge`;
  try{ new QRCode(holder, { text:upiStr, width:150, height:150, colorDark:'#15161B', colorLight:'#ffffff' }); }catch(e){ holder.textContent='QR unavailable'; }
}
function copyText(t){ navigator.clipboard?.writeText(t); showToast('Copied to clipboard'); }
async function submitUTR(){
  const utr = document.getElementById('utrInput').value.trim();
  if(!utr || utr.length<6){ showToast('Enter a valid UTR number'); return; }
  await finalizeRechargeRequest(currentRecharge.amount, currentRecharge.ref, utr);
  currentRecharge = null; showToast('Payment submitted — pending verification'); renderPage();
}
async function finalizeRechargeRequest(amount, ref, utr){
  const req = { id:uidGen('wr'), userUid:state.user.uid, username:state.user.name, email:state.user.email, amount, utr, ref, date:new Date().toISOString(), status:'pending' };
  DB.walletRequests.unshift(req); await saveKey('ev-wallet-requests', DB.walletRequests);
  logActivity(`Recharge request of ${fmtINR(amount)} submitted by ${state.user.name}`);
  pushNotification(state.user.uid, `Recharge of ${fmtINR(amount)} submitted — pending verification.`);
  state.user.pendingRecharge = null;
  await saveKey('ev-customers', DB.customers);
}

/* ---- Forced payment-confirmation popup ----
   Shown whenever the logged-in user has a QR/recharge draft that was never resolved
   (never auto-dismisses — the person must either submit a UTR or tell us why they
   didn't pay before it goes away, and it will not reappear until their next recharge). */
function maybeShowPendingRechargePopup(){
  const pr = state.user && state.user.pendingRecharge;
  if(!pr) return;
  openModal(`
    <h3 style="margin:0 0 6px;">Payment check</h3>
    <p style="font-size:13px;color:var(--amber);font-weight:700;margin:0 0 4px;">Have you completed this payment or not?</p>
    <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 14px;">You started a recharge of <b>${fmtINR(pr.amount)}</b> that hasn't been confirmed yet.</p>
    <span class="label">Enter UTR number (if you've paid)</span>
    <input class="input" id="pendingUtr" placeholder="12 digit UTR from your bank app"/>
    <button class="btn btn-primary" style="width:100%;margin-top:10px;" onclick="resolvePendingRecharge('paid')">I've paid — submit UTR</button>
    <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--line);">
      <span class="label">If you haven't paid, please tell us why</span>
      <select class="input" id="declineReason">
        <option>Changed my mind</option><option>Payment failed</option><option>Will pay later</option>
        <option>Technical issue</option><option>Other reason</option>
      </select>
      <button class="btn btn-ghost" style="width:100%;margin-top:10px;" onclick="resolvePendingRecharge('declined')">I haven't paid</button>
    </div>
  `, true);
  const overlay = document.querySelector('#modalRoot .modal-overlay');
  if(overlay) overlay.removeAttribute('onclick'); /* cannot be dismissed by tapping outside */
}
async function resolvePendingRecharge(action){
  const pr = state.user.pendingRecharge;
  if(!pr) { closeModal(); return; }
  if(action==='paid'){
    const utr = document.getElementById('pendingUtr').value.trim();
    if(!utr || utr.length<6){ showToast('Enter a valid UTR number'); return; }
    await finalizeRechargeRequest(pr.amount, pr.ref, utr);
    closeModal(); showToast('Payment submitted — pending verification');
  } else {
    const reason = document.getElementById('declineReason').value;
    logActivity(`${state.user.name} did not complete a ${fmtINR(pr.amount)} recharge — reason: ${reason}`);
    state.user.pendingRecharge = null;
    await saveKey('ev-customers', DB.customers);
    closeModal(); showToast('Thanks for letting us know');
  }
  currentRecharge = null;
  if(state.page==='wallet') renderPage();
}

async function claimReferral(refId){
  const ref = DB.referrals.find(r=>r.id===refId);
  const referrer = DB.customers.find(c=>c.uid===ref.referrerUid);
  if(!referrer.hasQualifyingRecharge){ showToast(`Recharge at least ${fmtINR(REFERRAL_MIN_RECHARGE)} to unlock claiming`); return; }
  if(ref.status!=='qualified'){ showToast('This referral is not ready to claim'); return; }
  referrer.wallet += ref.rewardAmount;
  ref.status = 'claimed';
  await saveKey('ev-customers', DB.customers);
  await saveKey('ev-referrals', DB.referrals);
  logActivity(`${referrer.name} claimed ${fmtINR(ref.rewardAmount)} referral reward`);
  showToast(`${fmtINR(ref.rewardAmount)} added to your wallet`);

}

function adminStats(){

function revenueTrend(){
  const days=[];
  for(let i=13;i>=0;i--){

    const revenue = DB.orders.filter(o=>o.status==='completed' && new Date(o.date).toDateString()===dayStr).reduce((s,o)=>s+o.amount,0);
    days.push(revenue);
  }
  return days;
}

async function saveProduct(id){
  const type = document.getElementById('pf_type_premium').classList.contains('active') ? 'premium' : 'free';
  const title = document.getElementById('pf_title').value.trim() || 'Untitled asset';
  const downloadLink = document.getElementById('pf_downloadLink').value.trim();
  const status = document.getElementById('pf_status').value;
  if(status==='published' && !downloadLink){ showToast('Add a download link before publishing'); return; }
  const data = {
    type, title,
    description: document.getElementById('pf_description').value.trim(),
    downloadLink,
    category: document.getElementById('pf_category').value,
    price: type==='premium' ? Number(document.getElementById('pf_price').value)||0 : 0,
    discount: type==='premium' ? Number(document.getElementById('pf_discount').value)||0 : 0,
    status,
    thumbnail: pendingThumbnail,
  };
  const snapshot = JSON.parse(JSON.stringify(DB.products));
  let newProd = null;
  if(id){
    const p = DB.products.find(x=>x.id===id);
    const titleChanged = p.title !== title;
    Object.assign(p,data);
    p.updated = fmtDate(new Date());
    if(titleChanged) p.slug = uniqueSlug(title, id);
  } else {
    newProd = { id:uidGen('prod'), ...data, slug:'', downloads:0, size:'—', updated:fmtDate(new Date()) };
    newProd.slug = uniqueSlug(title, newProd.id);
    DB.products.unshift(newProd);
  }
  const ok = await saveKey('ev-products', DB.products);
  if(!ok){
    DB.products = snapshot; // roll back in-memory change so UI never shows unsaved data as saved
    showToast('⚠️ Could not save — try a smaller thumbnail image');
    return;
  }
  logActivity(id ? `Product "${title}" updated` : `Product "${title}" uploaded (${type})`);
  if(!id && status==='published'){
    DB.customers.forEach(c=> pushNotification(c.uid, `New ${type==='free'?'free asset':'VIP product'} added: ${title}`));
  }
  pendingThumbnail = null;
  closeModal(); showToast(id?'Product updated':'Product uploaded'); renderAdmin();
}
async function deleteProduct(id){
  const p = DB.products.find(x=>x.id===id);
  const snapshot = JSON.parse(JSON.stringify(DB.products));
  DB.products = DB.products.filter(p=>p.id!==id);
  const ok = await saveKey('ev-products', DB.products);
  if(!ok){ DB.products = snapshot; showToast('⚠️ Could not delete — please try again'); renderAdmin(); return; }
  logActivity(`Product "${p?.title}" deleted`);
  showToast('Product deleted'); renderAdmin();
}

          <td style="font-size:11.5px;color:var(--ink-soft);">${r.utr}</td><td style="font-size:11.5px;color:var(--ink-soft);">${r.ref}</td>
          <td style="font-size:11.5px;color:var(--ink-soft);">${fmtDate(r.date)} · ${fmtTime(r.date)}</td><td>${statusPill(r.status)}</td>
          <td>${r.status==='pending' ? `<div style="display:flex;gap:6px;justify-content:flex-end;">
            <button class="icon-btn" style="background:var(--green)16;" onclick="decideRequest('${r.id}','approved')">${icon('check',14,'var(--green)')}</button>
            <button class="icon-btn" style="background:var(--red)16;" onclick="decideRequest('${r.id}','rejected')">${icon('x',14,'var(--red)')}</button></div>` : '—'}</td></tr>`).join('')
          : `<tr><td colspan="8" style="text-align:center;color:var(--ink-faint);padding:24px;">No recharge requests yet.</td></tr>`}</tbody></table>
    </div>`;
}
async function decideRequest(id, decision){
  const r = DB.walletRequests.find(x=>x.id===id); r.status = decision;
  await saveKey('ev-wallet-requests', DB.walletRequests);
  if(decision==='approved'){
    const cust = DB.customers.find(c=>c.uid===r.userUid);
    if(cust){
      cust.wallet += r.amount;
      if(r.amount >= REFERRAL_MIN_RECHARGE) cust.hasQualifyingRecharge = true;
      await saveKey('ev-customers', DB.customers);
      await processReferralQualification(cust, r.amount);
    }
    pushNotification(r.userUid, `Recharge of ${fmtINR(r.amount)} approved and credited to your wallet.`);
    logActivity(`Recharge of ${fmtINR(r.amount)} approved for ${r.username}`);
  } else {
    pushNotification(r.userUid, `Recharge request of ${fmtINR(r.amount)} was rejected.`);
    logActivity(`Recharge of ${fmtINR(r.amount)} rejected for ${r.username}`);
  }
  showToast(decision==='approved'?`${fmtINR(r.amount)} credited to ${r.username}`:`Request rejected`);
  renderAdminNav(); renderAdmin();
}
async function processReferralQualification(cust, amount){
  const ref = DB.referrals.find(r=>r.referredUid===cust.uid && r.status==='pending');
  if(!ref) return;
  if(new Date(ref.expiresAt) < new Date()){
    ref.status = 'expired'; await saveKey('ev-referrals', DB.referrals); return;
  }
  if(amount < REFERRAL_MIN_RECHARGE) return;
  ref.status = 'qualified';
  await saveKey('ev-referrals', DB.referrals);
  cust.wallet += REFERRAL_WELCOME_BONUS;
  await saveKey('ev-customers', DB.customers);
  pushNotification(cust.uid, `You received a ₹${REFERRAL_WELCOME_BONUS} welcome bonus for joining via a referral!`);
  const referrer = DB.customers.find(c=>c.uid===ref.referrerUid);
  if(referrer) pushNotification(referrer.uid, `Your referral ${cust.name} qualified! ${fmtINR(ref.rewardAmount)} is ready to claim.`);
  logActivity(`Referral qualified: ${cust.name} → reward ready for referrer`);
}

          <tr><td style="display:flex;align-items:center;gap:8px;font-weight:600;">
            <span style="width:26px;height:26px;border-radius:99px;background:var(--accent);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:10.5px;">${initials(u.name)}</span>${u.name}</td>
          <td>${fmtINR(u.wallet)}</td><td style="color:var(--ink-soft);">${u.purchases.length}</td>

          </div></td></tr>`).join('') : `<tr><td colspan="7" style="text-align:center;color:var(--ink-faint);padding:24px;">No users have signed up yet.</td></tr>`}</tbody></table>

}
function viewUser(uid){
  const u = DB.customers.find(x=>x.uid===uid);
  openModal(`<h3>User profile</h3>
    <div style="display:flex;align-items:center;gap:10px;margin:12px 0;">
      <span style="width:44px;height:44px;border-radius:99px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;">${initials(u.name)}</span>
      <div><div style="font-weight:700;">${u.name}</div><div style="font-size:12px;color:var(--ink-soft);">${u.email}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px;">
      ${[['Account ID',u.uid],['Referral code',u.referralCode],['Wallet',fmtINR(u.wallet)],['Purchases',u.purchases.length],['Joined',u.joined],['Last login',u.lastLogin]].map(([l,v])=>`
        <div style="background:var(--line-soft);padding:10px;border-radius:12px;"><div style="font-size:11px;color:var(--ink-soft);">${l}</div><div style="font-weight:600;">${v}</div></div>`).join('')}
    </div>
    ${isBlocked(u)?`<div class="card" style="padding:10px 12px;margin-top:10px;background:#FDECEC;"><span style="font-size:12.5px;color:var(--red);">Blocked until ${fmtDate(u.blockedUntil)} — ${u.blockReason}</span></div>`:''}
    ${hasActiveWarning(u)?`<div class="card" style="padding:10px 12px;margin-top:10px;background:#FFF7EA;"><span style="font-size:12.5px;color:#8A6416;">Warning active until ${fmtDate(u.warning.expiresAt)}: "${u.warning.message}"</span></div>`:''}
  `);
}
function openWarnModal(uid){
  openModal(`<h3 style="margin:0 0 14px;">Send account warning</h3>
    <span class="label">Warning message (shown to the user)</span>
    <textarea class="input" id="warnMsg" rows="3" placeholder="e.g. We noticed suspicious payment activity on your account..."></textarea>
    <span class="label" style="margin-top:10px;">Show this warning for</span>
    <select class="input" id="warnDays"><option value="3">3 days</option><option value="1">1 day</option><option value="7">7 days</option></select>
    <button class="btn btn-primary" style="width:100%;margin-top:14px;" onclick="sendWarning('${uid}')">Send warning</button>`);
}
async function sendWarning(uid){
  const message = document.getElementById('warnMsg').value.trim();
  const days = Number(document.getElementById('warnDays').value);
  if(!message){ showToast('Enter a warning message'); return; }
  const u = DB.customers.find(x=>x.uid===uid);
  u.warning = { message, issuedAt:new Date().toISOString(), expiresAt: new Date(Date.now()+days*86400000).toISOString() };
  await saveKey('ev-customers', DB.customers);
  pushNotification(uid, `Admin warning: ${message}`);
  logActivity(`Warning sent to ${u.name} (${days} days)`);
  closeModal(); showToast('Warning sent'); renderAdmin();
}
function openBlockModal(uid){
  const u = DB.customers.find(x=>x.uid===uid);
  const blocked = isBlocked(u);
  openModal(`<h3 style="margin:0 0 14px;">${blocked?'Manage block':'Block account'}</h3>
    ${blocked ? `<p style="font-size:13px;color:var(--ink-soft);">Currently blocked until ${fmtDate(u.blockedUntil)} — ${u.blockReason}</p>
      <button class="btn btn-primary" style="width:100%;margin-top:12px;" onclick="unblockUser('${uid}')">Unblock now</button>`
    : `<span class="label">Reason</span>
      <input class="input" id="blockReason" placeholder="e.g. Fake UPI payment / fraudulent UTR submitted"/>
      <span class="label" style="margin-top:10px;">Restrict account for</span>
      <select class="input" id="blockDays"><option value="2">2 days</option><option value="3">3 days</option><option value="7">7 days</option></select>
      <button class="btn btn-primary" style="width:100%;margin-top:14px;background:var(--red);" onclick="blockUser('${uid}')">Block account</button>`}
  `);
}
async function blockUser(uid){
  const reason = document.getElementById('blockReason').value.trim();
  const days = Number(document.getElementById('blockDays').value);
  if(!reason){ showToast('Enter a reason for blocking'); return; }
  const u = DB.customers.find(x=>x.uid===uid);
  u.blockedUntil = new Date(Date.now()+days*86400000).toISOString();
  u.blockReason = reason;
  await saveKey('ev-customers', DB.customers);
  logActivity(`${u.name} blocked for ${days} days — reason: ${reason}`);
  closeModal(); showToast('Account blocked'); renderAdmin();
}
async function unblockUser(uid){
  const u = DB.customers.find(x=>x.uid===uid);
  u.blockedUntil = null; u.blockReason = null;
  await saveKey('ev-customers', DB.customers);
  logActivity(`${u.name} unblocked by admin`);
  closeModal(); showToast('Account unblocked'); renderAdmin();
}
async function toggleUser(uid){
  const u = DB.customers.find(x=>x.uid===uid);
  u.status = u.status==='active'?'disabled':'active';
  await saveKey('ev-customers', DB.customers);
  logActivity(`User ${u.name} ${u.status==='active'?'re-enabled':'disabled'} by admin`);
  showToast('User status updated'); renderAdmin();
}

function adminSettings(){
  return `<h1 style="font-size:22px;margin-bottom:16px;">Website Settings</h1>
    <div class="card" style="padding:18px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${icon('megaphone',16,'var(--accent)')}<h3 style="margin:0;font-size:14px;">Homepage banner</h3></div>
      <span class="label">Banner text</span><input class="input" id="set_banner" value="${DB.settings.banner}"/>
      <span class="label" style="margin-top:10px;">Support email</span><input class="input" id="set_support" value="${DB.settings.supportEmail}"/>
      <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="saveSettings()">Save changes</button>
    </div>
    <div class="card" style="padding:18px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">${icon('wallet',16,'var(--gold)')}<h3 style="margin:0;font-size:14px;">Payment UPI ID</h3></div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 8px;">This is the UPI ID customers pay to — change it any time to point to a different bank account. All new QR codes will use the updated ID immediately.</p>
      <span class="label">UPI ID</span><input class="input" id="set_upi" value="${DB.settings.upiId}"/>
      <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="saveSettings()">Save changes</button>
    </div>
    <div class="card" style="padding:18px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">${icon('bell',16,'var(--accent2)')}<h3 style="margin:0;font-size:14px;">Broadcast notification</h3></div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;">Send an in-app notification to every registered user right now.</p>
      <input class="input" id="broadcastMsg" placeholder="e.g. New CapCut templates just dropped!"/>
      <button class="btn btn-primary btn-sm" style="margin-top:10px;" onclick="sendBroadcast()">Send to all users</button>
    </div>
    <div class="card" style="padding:18px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">${icon('shield',16,'var(--green)')}<h3 style="margin:0;font-size:14px;">Maintenance mode</h3></div>
      <p style="font-size:12.5px;color:var(--ink-soft);margin:0 0 10px;">Temporarily disable the storefront for all customers.</p>
      <button class="btn ${DB.settings.maintenance?'btn-gold':'btn-ghost'} btn-sm" onclick="toggleMaintenance()">${DB.settings.maintenance?'Disable maintenance mode':'Enable maintenance mode'}</button>
    </div>`;
}
async function saveSettings(){
  DB.settings.banner = document.getElementById('set_banner').value;
  DB.settings.supportEmail = document.getElementById('set_support').value;
  const upiField = document.getElementById('set_upi');
  if(upiField) DB.settings.upiId = upiField.value.trim() || DB.settings.upiId;
  await saveKey('ev-settings', DB.settings);
  logActivity('Website settings updated');
  showToast('Settings saved');
}
async function sendBroadcast(){
  const msg = document.getElementById('broadcastMsg').value.trim();
  if(!msg){ showToast('Enter a message to send'); return; }
  DB.customers.forEach(c=> pushNotification(c.uid, msg));
  logActivity(`Broadcast sent to ${DB.customers.length} users: "${msg}"`);
  document.getElementById('broadcastMsg').value='';
  showToast(`Sent to ${DB.customers.length} user${DB.customers.length===1?'':'s'}`);
}
async function toggleMaintenance(){
  DB.settings.maintenance = !DB.settings.maintenance;
  await saveKey('ev-settings', DB.settings);
  logActivity(`Maintenance mode ${DB.settings.maintenance?'enabled':'disabled'}`);
  showToast(DB.settings.maintenance?'Maintenance mode enabled':'Maintenance mode disabled');
  renderAdmin();
}
</script>
